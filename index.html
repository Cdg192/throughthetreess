<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTHENIA - 3D RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #e94560;
            padding: 15px;
            border-radius: 5px;
            width: 250px;
        }
        .hud-title { color: #e94560; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .stat-row { margin: 5px 0; font-size: 13px; }
        .stat-label { color: #0a94da; }
        .stat-value { color: #00d680; }
        #combatLog {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f3460;
            padding: 10px;
            border-radius: 4px;
            width: 300px;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry { margin: 3px 0; }
        .log-normal { color: #e0e0e0; }
        .log-success { color: #00d680; }
        .log-warning { color: #ffa500; }
        .log-error { color: #ff4444; }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0a94da;
            padding: 15px;
            border-radius: 4px;
            max-width: 300px;
        }
        .control-title { color: #0a94da; font-weight: bold; margin-bottom: 8px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button {
            padding: 8px 12px;
            background: #0f3460;
            color: #0a94da;
            border: 1px solid #0a94da;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            pointer-events: auto;
        }
        button:hover { background: #0a94da; color: #0f3460; }
        #enemyInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #e94560;
            padding: 15px;
            border-radius: 5px;
            width: 250px;
            display: none;
        }
        .healthbar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 1px solid #0a94da;
            margin-top: 5px;
            border-radius: 2px;
            overflow: hidden;
        }
        .healthbar-fill {
            height: 100%;
            background: #00d680;
            width: 100%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="hud">
            <div class="hud-title">⚔️ ASTHENIA</div>
            <div class="stat-row"><span class="stat-label">Caleb</span></div>
            <div class="stat-row">❤️ <span class="stat-label">HP:</span> <span class="stat-value" id="playerHp">100/100</span></div>
            <div class="stat-row">⚔️ <span class="stat-label">ATK:</span> <span class="stat-value" id="playerAtk">8</span></div>
            <div class="stat-row">🛡️ <span class="stat-label">DEF:</span> <span class="stat-value" id="playerDef">5</span></div>
            <div class="stat-row">💰 <span class="stat-label">Gold:</span> <span class="stat-value" id="playerGold">0</span></div>
            <div class="stat-row" style="margin-top: 10px;">🤝 <span class="stat-label">Party: Chazz</span></div>
            <div class="healthbar" style="margin-top: 10px;">
                <div class="healthbar-fill" id="playerHealthbar"></div>
            </div>
        </div>

        <div id="enemyInfo">
            <div id="enemyName" style="color: #e94560; font-weight: bold;"></div>
            <div id="enemyHp" style="margin-top: 5px;"></div>
            <div class="healthbar">
                <div class="healthbar-fill" id="enemyHealthbar"></div>
            </div>
        </div>

        <div id="combatLog">
            <div style="color: #0a94da; font-weight: bold; margin-bottom: 5px;">Battle Log</div>
            <div id="logContent"></div>
        </div>

        <div id="controls">
            <div class="control-title">⌨️ Actions</div>
            <div class="button-group" id="actionButtons"></div>
        </div>
    </div>

    <script>
        // Scene setup
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.OrthographicCamera(
            -20, 20, 15, -15, 0.1, 1000
        );
        camera.position.set(0, 20, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        // Lighting - bright lights to ensure visibility
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(15, 25, 15);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.left = -30;
        directionalLight.shadow.camera.right = 30;
        directionalLight.shadow.camera.top = 30;
        directionalLight.shadow.camera.bottom = -30;
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // Game state
        const game = {
            location: 'cottage',
            playerHp: 100,
            playerMaxHp: 100,
            playerAttack: 8,
            playerDefense: 5,
            gold: 0,
            inCombat: false,
            currentEnemy: null,
            gameOver: false,
            animating: false,
            log: []
        };

        // Create ground plane
        function createGround(size = 30) {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(size, size),
                new THREE.MeshStandardMaterial({ color: 0x4a7c59, roughness: 0.8 })
            );
            ground.receiveShadow = true;
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            scene.add(ground);
        }

        // Create player (Caleb with guitar)
        function createPlayer() {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1.2, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xCD853F, roughness: 0.7 })
            );
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFD7A8, roughness: 0.6 })
            );
            head.position.y = 1.4;
            head.castShadow = true;
            group.add(head);

            // Guitar (simplified)
            const guitar = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 1.2, 0.1),
                new THREE.MeshStandardMaterial({ color: 0xD2691E, roughness: 0.5 })
            );
            guitar.position.set(0.5, 0.5, 0);
            guitar.rotation.z = 0.3;
            guitar.castShadow = true;
            group.add(guitar);

            group.position.set(-5, 0, 0);
            group.castShadow = true;
            return group;
        }

        // Create enemy
        function createEnemy(type = 'cultist') {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1.2, 0.4),
                new THREE.MeshStandardMaterial({ color: type === 'cultist' ? 0x8B1a1a : 0xCC0000, roughness: 0.7 })
            );
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 16, 16),
                new THREE.MeshStandardMaterial({ color: type === 'cultist' ? 0xFF4444 : 0xFF0000, roughness: 0.6 })
            );
            head.position.y = 1.4;
            head.castShadow = true;
            group.add(head);

            group.position.set(5, 0, 0);
            group.castShadow = true;
            return group;
        }

        // Create scene elements
        let player = createPlayer();
        let enemy = null;
        scene.add(player);
        createGround();

        // Combat system
        function startCombat(enemyType = 'cultist') {
            if (enemy) scene.remove(enemy);
            enemy = createEnemy(enemyType);
            scene.add(enemy);
            
            game.inCombat = true;
            game.currentEnemy = { 
                name: enemyType === 'cultist' ? 'Cultist Minion' : 'Tracey',
                hp: enemyType === 'cultist' ? 25 : 80,
                maxHp: enemyType === 'cultist' ? 25 : 80,
                attack: enemyType === 'cultist' ? 5 : 12,
                isBoss: enemyType === 'tracey'
            };
            
            updateUI();
            updateActionButtons();
            addLog(`${game.currentEnemy.name} appears!`, 'log-warning');
        }

        function endCombat() {
            game.inCombat = false;
            game.currentEnemy = null;
            if (enemy) {
                scene.remove(enemy);
                enemy = null;
            }
            updateUI();
        }

        // Combat actions
        async function performAttack() {
            if (game.animating || !game.inCombat) return;
            game.animating = true;

            // Animate player swing
            addLog(`Caleb swings his Gibson Guitar!`, 'log-normal');
            await animateAttack(player, 0.3);

            const damage = game.playerAttack + Math.floor(Math.random() * 4) - 1;
            game.currentEnemy.hp -= damage;
            addLog(`Hit for ${damage} damage!`, 'log-success');

            if (game.currentEnemy.hp <= 0) {
                addLog(`${game.currentEnemy.name} defeated!`, 'log-success');
                await new Promise(resolve => setTimeout(resolve, 500));
                endCombat();
            } else {
                await new Promise(resolve => setTimeout(resolve, 500));
                enemyAttack();
            }

            updateUI();
            game.animating = false;
        }

        function enemyAttack() {
            const damage = Math.max(1, game.currentEnemy.attack - game.playerDefense + Math.floor(Math.random() * 3) - 1);
            game.playerHp -= damage;
            
            if (game.currentEnemy.isBoss) {
                const traceyComments = [
                    '"Where are you?!"',
                    '"I can\'t see!"',
                    '"Stupid eyes!"'
                ];
                addLog(`${game.currentEnemy.name} attacks: ${traceyComments[Math.floor(Math.random() * traceyComments.length)]}`, 'log-error');
            } else {
                addLog(`${game.currentEnemy.name} attacks for ${damage} damage!`, 'log-error');
            }
            
            addLog(`You took ${damage} damage!`, 'log-error');

            if (game.playerHp <= 0) {
                game.gameOver = true;
                addLog('You have been defeated...', 'log-error');
            }
        }

        function defendAction() {
            if (game.animating || !game.inCombat) return;
            game.animating = true;

            addLog('Caleb defends!', 'log-normal');
            const damage = Math.max(1, Math.floor(game.currentEnemy.attack / 2));
            game.playerHp -= damage;
            addLog(`Reduced damage: ${damage}`, 'log-success');

            if (game.playerHp > 0) {
                setTimeout(() => {
                    updateUI();
                    game.animating = false;
                }, 800);
            }
        }

        // Animations
        async function animateAttack(obj, duration) {
            const startPos = obj.position.x;
            const steps = 10;
            for (let i = 0; i < steps; i++) {
                obj.position.x = startPos + Math.sin(i / steps * Math.PI) * 2;
                obj.rotation.y = Math.sin(i / steps * Math.PI * 2) * 0.5;
                await new Promise(r => setTimeout(r, duration * 1000 / steps));
            }
            obj.position.x = startPos;
            obj.rotation.y = 0;
        }

        // UI updates
        function updateUI() {
            document.getElementById('playerHp').textContent = `${Math.max(0, game.playerHp)}/${game.playerMaxHp}`;
            document.getElementById('playerHealthbar').style.width = `${(Math.max(0, game.playerHp) / game.playerMaxHp) * 100}%`;
            document.getElementById('playerGold').textContent = game.gold;

            if (game.inCombat && game.currentEnemy) {
                document.getElementById('enemyInfo').style.display = 'block';
                document.getElementById('enemyName').textContent = game.currentEnemy.name;
                document.getElementById('enemyHp').textContent = `❤️ ${game.currentEnemy.hp}/${game.currentEnemy.maxHp}`;
                document.getElementById('enemyHealthbar').style.width = `${(game.currentEnemy.hp / game.currentEnemy.maxHp) * 100}%`;
            } else {
                document.getElementById('enemyInfo').style.display = 'none';
            }
        }

        function updateActionButtons() {
            const container = document.getElementById('actionButtons');
            container.innerHTML = '';

            if (game.inCombat) {
                const attackBtn = document.createElement('button');
                attackBtn.textContent = '⚔️ Attack';
                attackBtn.onclick = performAttack;
                container.appendChild(attackBtn);

                const defendBtn = document.createElement('button');
                defendBtn.textContent = '🛡️ Defend';
                defendBtn.onclick = defendAction;
                container.appendChild(defendBtn);
            } else if (!game.gameOver) {
                const combatBtn = document.createElement('button');
                combatBtn.textContent = '🎮 Start Battle';
                combatBtn.onclick = () => startCombat('cultist');
                container.appendChild(combatBtn);

                const bossBtn = document.createElement('button');
                bossBtn.textContent = '👿 Fight Tracey';
                bossBtn.onclick = () => startCombat('tracey');
                container.appendChild(bossBtn);
            } else {
                const restartBtn = document.createElement('button');
                restartBtn.textContent = '🔄 Restart';
                restartBtn.onclick = () => location.reload();
                container.appendChild(restartBtn);
            }
        }

        function addLog(message, className = 'log-normal') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${className}`;
            entry.textContent = message;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            
            game.log.push(message);
            if (game.log.length > 20) {
                logContent.removeChild(logContent.firstChild);
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Gentle enemy rotation
            if (enemy) {
                enemy.rotation.y += 0.01;
            }
            
            renderer.render(scene, camera);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize when DOM is ready
        function init() {
            updateUI();
            updateActionButtons();
            addLog('🎮 Welcome to ASTHENIA', 'log-warning');
            addLog('Caleb and Chazz prepare for battle!', 'log-normal');
            addLog('The sorceress Tracey has taken Ptouneigh...', 'log-warning');
            startCombat('cultist');
            animate();
        }

        // Wait for DOM and animations to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            setTimeout(init, 100);
        }
    </script>
</body>
</html>
