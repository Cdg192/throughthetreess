<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ THROUGH THE TREES</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            line-height: 1.6;
        }
        #container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #00ff00;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 5px;
        }
        h1 {
            text-align: center;
            color: #ffff00;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ffff00;
        }
        #output {
            height: 400px;
            overflow-y: auto;
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #output::-webkit-scrollbar {
            width: 10px;
        }
        #output::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #output::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }
        .system { color: #00ff00; }
        .location { color: #ffff00; font-weight: bold; }
        .npc { color: #00ffff; }
        .item { color: #ff00ff; }
        .enemy { color: #ff0000; }
        .success { color: #00ff00; }
        .error { color: #ff3333; }
        #input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #command { 
            flex: 1; 
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: #00cc00; }
        #stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .stat {
            border: 1px solid #00ff00;
            padding: 8px;
            text-align: center;
        }
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .buttons button {
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>⚔️ THROUGH THE TREES ⚔️</h1>
        <div id="stats"></div>
        <div id="output"></div>
        <div class="buttons" id="buttons"></div>
        <div id="input-area">
            <input type="text" id="command" placeholder="Enter command...">
            <button onclick="handleInput()">Enter</button>
        </div>
    </div>

    <script>
        const game = {
            location: 'village',
            hp: 100,
            maxHp: 100,
            attack: 5,
            defense: 0,
            gold: 20,
            xp: 0,
            level: 1,
            inventory: [],
            defeatedEnemies: [],
            inCombat: false,
            currentEnemy: null,
            gameOver: false,
            victory: false,

            locations: {
                village: {
                    name: 'Through the Trees Village',
                    desc: 'A quiet village at the edge of a dark forest. Smoke curls from chimneys and villagers whisper of monsters in the woods.',
                    exits: { north: 'forest', east: 'market' },
                    npcs: ['elder']
                },
                market: {
                    name: 'Village Market',
                    desc: 'Stalls line the cobblestone square. A merchant eyes you suspiciously. Items for sale: rusty sword (10g), health potion (8g).',
                    exits: { west: 'village' },
                    npcs: ['merchant']
                },
                forest: {
                    name: 'Forest Entrance',
                    desc: 'Twisted oaks loom overhead. The path is dark and overgrown. A wolf snarls in the shadows.',
                    exits: { south: 'village', north: 'grove' },
                    enemy: 'wolf'
                },
                grove: {
                    name: 'Dark Grove',
                    desc: 'A ruined stone altar glows faintly with ancient runes. The air is cold. A shadow beast materializes before you.',
                    exits: { south: 'forest', north: 'cave' },
                    enemy: 'shadow_beast'
                },
                cave: {
                    name: 'Cave of Echoes',
                    desc: 'A massive cave entrance yawns before you. Cold air emanates from within. A troll blocks the passage.',
                    exits: { south: 'grove', north: 'lair' },
                    enemy: 'cave_troll'
                },
                lair: {
                    name: "The Dragon's Lair",
                    desc: 'Bones litter the ground. A massive dragon coils around a glowing orb - the Dragon Orb!',
                    exits: { south: 'cave' },
                    enemy: 'dragon',
                    isFinal: true
                }
            },

            enemies: {
                wolf: { name: 'Forest Wolf', hp: 20, attack: 6, xp: 15, gold: 5 },
                shadow_beast: { name: 'Shadow Beast', hp: 35, attack: 10, xp: 30, gold: 12 },
                cave_troll: { name: 'Cave Troll', hp: 50, attack: 14, xp: 50, gold: 20 },
                dragon: { name: 'Ancient Dragon', hp: 100, attack: 22, xp: 200, gold: 100 }
            },

            npcs: {
                elder: 'The Elder says: "The Dragon Orb has been stolen! Please venture north into the forest and recover it. Arm yourself at the market first!"',
                merchant: 'The Merchant says: "I have fine wares! Rusty Sword (10g) or Health Potion (8g). What\'ll it be?"'
            }
        };

        const log = [];

        function addLog(text, className = 'system') {
            log.push({ text, className });
            updateOutput();
        }

        function updateOutput() {
            const output = document.getElementById('output');
            output.innerHTML = log.map(entry => 
                `<span class="${entry.className}">${escapeHtml(entry.text)}</span>`
            ).join('\n');
            output.scrollTop = output.scrollHeight;
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <div class="stat">❤️ HP: ${game.hp}/${game.maxHp}</div>
                <div class="stat">⚔️ ATK: ${game.attack}</div>
                <div class="stat">🛡️ DEF: ${game.defense}</div>
                <div class="stat">💰 Gold: ${game.gold}g</div>
                <div class="stat">✨ Level: ${game.level}</div>
                <div class="stat">📈 XP: ${game.xp}</div>
            `;
        }

        function updateButtons() {
            const buttons = document.getElementById('buttons');
            const suggestions = [];
            const loc = game.locations[game.location];

            if (game.inCombat) {
                suggestions.push({ text: 'attack', cmd: 'attack' });
                suggestions.push({ text: 'use potion', cmd: 'use potion' });
                suggestions.push({ text: 'flee', cmd: 'flee' });
            } else {
                suggestions.push({ text: 'look', cmd: 'look' });
                if (loc.exits.north) suggestions.push({ text: 'north', cmd: 'north' });
                if (loc.exits.south) suggestions.push({ text: 'south', cmd: 'south' });
                if (loc.exits.east) suggestions.push({ text: 'east', cmd: 'east' });
                if (loc.exits.west) suggestions.push({ text: 'west', cmd: 'west' });
                if (loc.npcs) suggestions.push({ text: 'talk', cmd: 'talk' });
            }

            buttons.innerHTML = suggestions.map(s => 
                `<button onclick="processCommand('${s.cmd}')">${s.text}</button>`
            ).join('');
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function handleInput() {
            const cmd = document.getElementById('command').value.trim().toLowerCase();
            document.getElementById('command').value = '';
            if (cmd) processCommand(cmd);
        }

        function processCommand(cmd) {
            addLog(`> ${cmd}`);

            if (game.gameOver || game.victory) {
                if (cmd === 'restart') {
                    location.reload();
                } else {
                    addLog('Type "restart" to play again.', 'error');
                }
                return;
            }

            if (game.inCombat) {
                handleCombat(cmd);
                updateStats();
                updateButtons();
                return;
            }

            switch(cmd) {
                case 'look':
                    describeLocation();
                    break;
                case 'north':
                case 'south':
                case 'east':
                case 'west':
                    move(cmd);
                    break;
                case 'talk':
                    talk();
                    break;
                case 'inventory':
                case 'i':
                    showInventory();
                    break;
                case 'help':
                    showHelp();
                    break;
                case 'buy sword':
                    buy('sword', 10);
                    break;
                case 'buy potion':
                    buy('potion', 8);
                    break;
                case 'use potion':
                    usePotion();
                    break;
                case 'attack':
                    handleCombat('attack');
                    break;
                default:
                    addLog('Unknown command. Type "help" for commands.', 'error');
            }

            updateStats();
            updateButtons();
        }

        function describeLocation() {
            const loc = game.locations[game.location];
            addLog(`\n${loc.name}`, 'location');
            addLog(loc.desc);
            const exits = Object.keys(loc.exits).length > 0 ? Object.keys(loc.exits).join(', ') : 'none';
            addLog(`Exits: ${exits}`);

            if (loc.enemy && !game.defeatedEnemies.includes(game.location)) {
                const enemy = game.enemies[loc.enemy];
                addLog(`\n⚠️ A ${enemy.name} blocks your path!`, 'enemy');
                game.inCombat = true;
                game.currentEnemy = { ...enemy };
            }
        }

        function move(direction) {
            const loc = game.locations[game.location];
            if (loc.exits[direction]) {
                game.location = loc.exits[direction];
                describeLocation();
            } else {
                addLog('You can\'t go that way.', 'error');
            }
        }

        function talk() {
            const loc = game.locations[game.location];
            if (loc.npcs && loc.npcs.length > 0) {
                addLog(`\n${game.npcs[loc.npcs[0]]}`, 'npc');
            } else {
                addLog('There\'s no one to talk to here.', 'error');
            }
        }

        function showInventory() {
            if (game.inventory.length === 0) {
                addLog('Your inventory is empty.');
            } else {
                addLog(`Inventory: ${game.inventory.join(', ')}`, 'item');
            }
        }

        function showHelp() {
            addLog(`\n--- COMMANDS ---
look - Look around
north/south/east/west - Move
talk - Talk to NPCs
inventory - Check items
buy sword - Buy sword (10g)
buy potion - Buy health potion (8g)
use potion - Use potion
attack - Attack in combat
flee - Flee from combat
help - Show this help
restart - Start over`, 'system');
        }

        function buy(item, cost) {
            if (game.location !== 'market') {
                addLog('There\'s no shop here.', 'error');
                return;
            }
            if (game.gold < cost) {
                addLog(`Not enough gold! You need ${cost}g.`, 'error');
                return;
            }
            if (item === 'sword') {
                if (game.inventory.includes('rusty sword')) {
                    addLog('You already have a sword.', 'error');
                    return;
                }
                game.inventory.push('rusty sword');
                game.attack = Math.max(game.attack, 8);
                game.gold -= cost;
                addLog(`You bought a rusty sword! ATK +${8 - 5}.`, 'success');
            } else if (item === 'potion') {
                game.inventory.push('health potion');
                game.gold -= cost;
                addLog('You bought a health potion!', 'success');
            }
        }

        function usePotion() {
            if (!game.inventory.includes('health potion')) {
                addLog('You don\'t have a potion.', 'error');
                return;
            }
            const heal = Math.min(30, game.maxHp - game.hp);
            game.hp = Math.min(game.hp + 30, game.maxHp);
            game.inventory = game.inventory.filter(i => i !== 'health potion');
            addLog(`You used a health potion! Healed ${heal} HP.`, 'success');
        }

        function handleCombat(cmd) {
            const enemy = game.currentEnemy;
            if (cmd === 'attack') {
                const playerDmg = game.attack + Math.floor(Math.random() * 5) - 2;
                const enemyDmg = Math.max(1, enemy.attack - game.defense + Math.floor(Math.random() * 4) - 2);

                addLog(`You strike ${enemy.name} for ${playerDmg} damage!`, 'success');
                enemy.hp -= playerDmg;

                if (enemy.hp <= 0) {
                    addLog(`💀 You defeated ${enemy.name}! +${enemy.xp} XP, +${enemy.gold}g!`, 'success');
                    game.xp += enemy.xp;
                    game.gold += enemy.gold;
                    game.defeatedEnemies.push(game.location);
                    game.inCombat = false;
                    game.currentEnemy = null;

                    const loc = game.locations[game.location];
                    if (loc.isFinal) {
                        game.victory = true;
                        addLog(`\n🏆 VICTORY! The Dragon Orb is yours! The village is saved!`, 'success');
                        addLog('Type "restart" to play again.');
                    }
                } else {
                    addLog(`${enemy.name} strikes back for ${enemyDmg} damage!`, 'enemy');
                    game.hp -= enemyDmg;
                    addLog(`Your HP: ${game.hp}/${game.maxHp} | Enemy HP: ${enemy.hp}`);

                    if (game.hp <= 0) {
                        game.gameOver = true;
                        addLog(`\n💀 You have been slain... Game Over.`, 'error');
                        addLog('Type "restart" to play again.');
                    }
                }
            } else if (cmd === 'flee') {
                const damage = Math.max(1, enemy.attack - game.defense);
                game.hp -= damage;
                addLog(`You flee, taking ${damage} damage!`, 'item');
                if (game.hp > 0) {
                    game.location = 'village';
                    game.inCombat = false;
                    game.currentEnemy = null;
                    addLog('You fled to the village.');
                    describeLocation();
                } else {
                    game.gameOver = true;
                    addLog('💀 You were caught and defeated. Game Over.', 'error');
                }
            } else if (cmd === 'use potion') {
                usePotion();
            } else {
                addLog('In combat: attack / use potion / flee', 'error');
            }
        }

        // Initialize game
        window.addEventListener('load', () => {
            addLog('⚔️  WELCOME TO THROUGH THE TREES ⚔️', 'location');
            addLog('A text adventure RPG. Type "help" for commands.\n');
            describeLocation();
            updateStats();
            updateButtons();
            document.getElementById('command').focus();
        });

        document.getElementById('command').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleInput();
        });
    </script>
</body>
</html>
